    <!-- ── Security Headers (meta fallbacks) ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="DENY" />
    <meta http-equiv="Referrer-Policy"        content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy"     content="camera=(), microphone=(), geolocation=(), payment=(self)" />

      default-src 'self';

      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: blob: https://d64gsuwffb70l.cloudfront.net https://*.cloudfront.net https://www.google-analytics.com https://www.googletagmanager.com;
      connect-src 'self'
                  https://api.stripe.com
                  https://tek-agent-65076290.base44.app
                  https://www.google-analytics.com
                  https://analytics.google.com
                  https://region1.google-analytics.com;
      frame-src   https://js.stripe.com https://hooks.stripe.com;
      object-src  'none';
      base-uri    'self';
      form-action 'self';
    " />

    <!-- ── Google Analytics 4 ── -->
    <!-- IMPORTANT: Replace G-XXXXXXXXXX with your real GA4 Measurement ID -->
    <!-- Find it in Google Analytics → Admin → Data Streams → your stream -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_title:    document.title,
        page_location: window.location.href,
        // Enhanced ecommerce
        send_page_view: true,
      });

      // ── GA4 helper exposed globally for React ──
      window.trackEvent = function(eventName, params) {
        if (typeof gtag !== 'undefined') {
          gtag('event', eventName, params || {});
        }
      };
    </script>

    <!-- ── Structured Data: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AxonRing",
      "url": "https://axonring.com",
      "logo": "https://axonring.com/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@axonring.com",
        "contactType": "customer support"
      },
      "sameAs": ["https://axonring.store"]
    }
    </script>

    <!-- ── Structured Data: WebSite + SearchAction ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AxonRing",
      "url": "https://axonring.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://axonring.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
